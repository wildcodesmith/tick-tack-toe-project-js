<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tick tack toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Black+Ops+One&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=refresh" />



    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article class="body-wrapper">



        <section class="cardbox-container">
            <section class="top">
                <section class="logo">

                    <p class="cross">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>
                    <p class="circle"></p>

                </section>
                <section class="turn turn-section">
                    <p class="cross top-cross">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>
                    <p class="circle hide top-circle"></p>
                    <h4 class="top-turn-h4 cross-turn">Turn</h4>
                </section>
                <section class="refresh">
                    <span class="material-symbols-outlined" onclick="location.reload()">
                        refresh
                    </span>
                </section>

            </section>


            <section class="report-card hide">
                     
                <section class="two">
                    <p class="cross top-cross report-card-cross">
                        <span class="cross1"></span>
                        <span class="cross2"></span>
                    </p>
                      <p class="circle  top-circle report-card-circle"></p>
                    <p class="report-card-won-text">won</p>
                </section>

            </section>


            <div class="wrapper">
                <div class="box" id="1" id="w">

                    <!-- cross -->
                    <p class="cross hide1">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>




                    <p class="circle chide1"></p>


                </div>
                <div class="box" id="2">

                    <!-- cross -->
                    <p class="cross hide2">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide2"></p>


                </div>
                <div class="box" id="3">

                    <!-- cross -->
                    <p class="cross hide3">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide3"></p>


                </div>
                <div class="box" id="4">

                    <!-- cross -->
                    <p class="cross hide4">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide4"></p>


                </div>
                <div class="box" id="5">

                    <!-- cross -->
                    <p class="cross hide5">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide5"></p>


                </div>
                <div class="box" id="6">

                    <!-- cross -->
                    <p class="cross hide6">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide6"></p>


                </div>
                <div class="box" id="7">

                    <!-- cross -->
                    <p class="cross hide7">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide7"></p>


                </div>
                <div class="box" id="8">

                    <!-- cross -->
                    <p class="cross hide8">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide8"></p>


                </div>
                <div class="box" id="9">

                    <!-- cross -->
                    <p class="cross hide9">
                        <span class="cross1">

                        </span>
                        <span class="cross2"></span>
                    </p>

                    <!-- circle -->
                    <p class="circle chide9"></p>


                </div>
            </div>



        </section>

    </article>
